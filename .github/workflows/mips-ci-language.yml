name: MIPS CI - Language Tests

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 curl xz-utils \
            gcc-multilib g++-multilib qemu-user
          for tool in gcc g++; do
            binary=/usr/bin/$tool
            printf '#!/bin/bash\nargs=()\nfor arg in "$@"; do\n  [[ "$arg" == --sysroot=* ]] && continue\n  args+=("$arg")\ndone\nexec %s "${args[@]}"\n' "$binary" > /tmp/i686-linux-gnu-$tool
            chmod +x /tmp/i686-linux-gnu-$tool
            sudo mv /tmp/i686-linux-gnu-$tool /usr/local/bin/i686-linux-gnu-$tool
          done
          sudo ln -sf /usr/bin/ar    /usr/local/bin/i686-linux-gnu-ar
          sudo ln -sf /usr/bin/nm    /usr/local/bin/i686-linux-gnu-nm
          sudo ln -sf /usr/bin/strip /usr/local/bin/i686-linux-gnu-strip

      - name: Verify QEMU
        run: |
          qemu-mipsel --version
          echo "QEMU_LD_PREFIX=$HOME/toolchain/mips32el--glibc--stable-2024.05-1/mipsel-buildroot-linux-gnu/sysroot" >> $GITHUB_ENV

      - name: Clone depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git ~/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: Cache toolchain
        uses: actions/cache@v4
        with:
          path: ~/toolchain
          key: mips-toolchain-2024.05-1

      - name: Download toolchain
        run: |
          if [ ! -d ~/toolchain ]; then
            wget -q https://toolchains.bootlin.com/downloads/releases/toolchains/mips32el/tarballs/mips32el--glibc--stable-2024.05-1.tar.xz
            mkdir -p ~/toolchain
            tar -xf mips32el--glibc--stable-2024.05-1.tar.xz -C ~/toolchain
          fi
          cp ~/toolchain/mips32el--glibc--stable-2024.05-1/lib/gcc/mipsel-buildroot-linux-gnu/13.3.0/crtbeginS.o \
             ~/toolchain/mips32el--glibc--stable-2024.05-1/mipsel-buildroot-linux-gnu/sysroot/usr/lib/
          cp ~/toolchain/mips32el--glibc--stable-2024.05-1/lib/gcc/mipsel-buildroot-linux-gnu/13.3.0/crtendS.o \
             ~/toolchain/mips32el--glibc--stable-2024.05-1/mipsel-buildroot-linux-gnu/sysroot/usr/lib/
          echo "$HOME/toolchain/mips32el--glibc--stable-2024.05-1/bin" >> $GITHUB_PATH

      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          path: sdk

      - name: Sync dependencies
        run: |
          cat > .gclient <<'EOF'
          solutions = [
            {
              "name": "sdk",
              "url": "https://github.com/${{ github.repository }}",
              "managed": False,
            },
          ]
          EOF
          DEPOT_TOOLS_UPDATE=0 gclient sync -D --no-history

      - name: Build
        working-directory: sdk
        run: |
          BUILD="./tools/build.py --arch mips --mode release --toolchain-prefix mips=$HOME/toolchain/mips32el--glibc--stable-2024.05-1/bin/mipsel-buildroot-linux-gnu- --target-sysroot mips=$HOME/toolchain/mips32el--glibc--stable-2024.05-1/mipsel-buildroot-linux-gnu/sysroot --no-clang"
          $BUILD create_sdk
          $BUILD run_vm_tests
          $BUILD ffi_test_functions
          $BUILD ffi_test_dynamic_library

      - name: Test - language
        working-directory: sdk
        run: |
          DATE=$(date +%Y-%m-%d)
          ./tools/test.py --arch mips --mode release --timeout 1000 language | tee test_results_language_${DATE}.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mips-test-results-language-${{ github.run_id }}
          path: sdk/test_results_language_*.txt
